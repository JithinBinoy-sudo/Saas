<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Portlio - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#004a5c",
                        "on-tertiary-container": "#004050",
                        "tertiary-dim": "#00c0ea",
                        "surface-container-lowest": "#000000",
                        "outline-variant": "#48474a",
                        "on-secondary-fixed-variant": "#7511c3",
                        "tertiary-container": "#00cffc",
                        "on-secondary-fixed": "#4f0089",
                        "tertiary-fixed": "#00cffc",
                        "surface-dim": "#0e0e10",
                        "secondary-dim": "#9c48ea",
                        "surface-bright": "#2c2c2f",
                        "tertiary-fixed-dim": "#00c0ea",
                        "on-secondary-container": "#e9cdff",
                        "on-primary-fixed": "#000000",
                        "inverse-surface": "#fcf8fb",
                        "on-tertiary": "#004a5d",
                        "on-primary-fixed-variant": "#002a62",
                        "surface": "#0e0e10",
                        "on-error-container": "#ffb2b9",
                        "inverse-primary": "#005bc4",
                        "secondary-container": "#6f00be",
                        "on-primary-container": "#002150",
                        "surface-container-high": "#1f1f22",
                        "error": "#ff6e84",
                        "primary-fixed-dim": "#5391ff",
                        "primary-container": "#6e9fff",
                        "on-secondary": "#33005b",
                        "on-error": "#490013",
                        "primary-fixed": "#6e9fff",
                        "on-background": "#f9f5f8",
                        "secondary-fixed": "#e5c6ff",
                        "surface-container-low": "#131315",
                        "background": "#0e0e10",
                        "surface-tint": "#85adff",
                        "inverse-on-surface": "#565457",
                        "secondary-fixed-dim": "#dbb4ff",
                        "error-container": "#a70138",
                        "primary-dim": "#699cff",
                        "on-surface": "#f9f5f8",
                        "outline": "#767577",
                        "tertiary": "#69daff",
                        "error-dim": "#d73357",
                        "on-primary": "#002c66",
                        "surface-container": "#19191c",
                        "primary": "#85adff",
                        "on-surface-variant": "#adaaad",
                        "surface-container-highest": "#262528",
                        "secondary": "#c180ff",

                        "on-tertiary-fixed": "#002a35"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"

                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Background Ambient Glow -->
<div class="fixed top-0 left-0 w-[800px] h-[800px] bg-primary/10 rounded-full blur-[150px] -translate-x-1/2 -translate-y-1/2 pointer-events-none z-0"></div>
<!-- TopAppBar (From JSON) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-12 py-8 bg-[#0e0e10]/60 backdrop-blur-xl shadow-[0px_20px_40px_rgba(0,0,0,0.4)]">
<div class="text-2xl font-black tracking-tighter text-white">Portlio</div>
<div class="flex items-center space-x-6 hidden">
<!-- Navigation items hidden on transactional page -->
</div>
<div class="flex items-center space-x-6">
<button class="font-inter tracking-tight text-sm font-medium text-[#85adff] hover:text-[#85adff] transition-colors duration-300 scale-95 active:opacity-80 transition-all bg-surface-container-high px-4 py-2 rounded-full border border-outline-variant/15 relative overflow-hidden">
<span class="relative z-10">Support</span>
</button>
</div>
</header>
<!-- Main Content Canvas (Transactional Login) -->
<main class="flex-grow flex items-center justify-center relative z-10 px-6 pt-32 pb-24">
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container/60 backdrop-blur-[20px] rounded-xl p-10 border border-outline-variant/15 relative shadow-[0px_20px_40px_rgba(0,0,0,0.4)]">
<!-- Ghost Border Highlight -->
<div class="absolute inset-0 rounded-xl border border-white/10 pointer-events-none"></div>
<!-- Header -->
<div class="mb-10 text-center">
<h1 class="text-4xl font-headline font-bold tracking-tight text-on-surface mb-2">Welcome</h1>
<p class="text-on-surface-variant text-sm">Enter your details to access your command center.</p>
</div>
<!-- Form -->
<form class="space-y-6 relative z-10">
<!-- Company Name Input -->
<div class="space-y-2">
<label class="block text-xs font-label text-on-surface-variant font-medium ml-1">Company name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-primary transition-colors">business</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface rounded-lg pl-12 pr-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline" placeholder="Your Company" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-label text-on-surface-variant font-medium ml-1">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface rounded-lg pl-12 pr-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1 mb-2">
<label class="block text-xs font-label text-on-surface-variant font-medium">Password</label>
<a class="text-xs text-primary hover:text-secondary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 text-on-surface rounded-lg pl-12 pr-4 py-3 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full relative group mt-8" type="submit">
<!-- Glow behind button -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary to-secondary rounded-lg blur opacity-40 group-hover:opacity-70 transition duration-500"></div>
<div class="relative w-full bg-gradient-to-r from-primary to-secondary text-on-primary-fixed font-semibold py-3 rounded-lg text-sm transition-all shadow-[0px_5px_15px_rgba(133,173,255,0.2)]">
                        Sign up
                    </div>
</button>
</form>
<div class="mt-8 text-center text-xs text-on-surface-variant">
                Don't have an account? <a class="text-primary hover:text-white transition-colors" href="#">Request Access</a>
</div>
</div>
</main>
<!-- Footer (From JSON) -->
<footer class="w-full flex flex-col md:flex-row justify-between items-center px-12 py-10 mt-auto bg-[#0e0e10] z-10 border-t border-outline-variant/10">
<div class="text-lg font-bold text-white mb-4 md:mb-0">Portlio</div>
<div class="flex space-x-6 font-inter text-xs tracking-wide uppercase">
<a class="text-[#adaaad] hover:text-white transition-colors opacity-100 hover:opacity-80" href="#">Privacy Policy</a>
<a class="text-[#adaaad] hover:text-white transition-colors opacity-100 hover:opacity-80" href="#">Terms of Service</a>
<a class="text-[#adaaad] hover:text-white transition-colors opacity-100 hover:opacity-80" href="#">Security</a>
</div>
<div class="font-inter text-xs tracking-wide uppercase text-[#adaaad] mt-4 md:mt-0">
            © 2024 Portlio. Precision in PropTech.
        </div>
</footer>
</body></html>
